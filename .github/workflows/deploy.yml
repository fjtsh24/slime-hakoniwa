name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-functions:
    name: Deploy Firebase Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Install dependencies
        run: cd functions && npm ci
      - name: Build
        run: cd functions && npm run build
      - name: Deploy to Firebase
        run: firebase deploy --only functions,firestore --token "$FIREBASE_TOKEN" --non-interactive --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  # フロントエンド（Netlify Functions含む）は Netlify の GitHub ネイティブ連携で自動デプロイ
  # Netlify Console でリポジトリを連携済み（netlify.toml の設定を自動適用）
