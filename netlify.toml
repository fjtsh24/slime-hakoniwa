[build]
  base = "."
  publish = "frontend/dist"
  command = "npm ci --prefix netlify/functions && npm ci --prefix frontend && npm run build --prefix frontend"

[build.environment]
  NODE_VERSION = "20"
  # VITE_FIREBASE_* はFirebaseクライアント設定で意図的に公開される値のため
  # シークレットスキャンの対象から除外する
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_APP_ID,VITE_GA_MEASUREMENT_ID,FIREBASE_PROJECT_ID,GCLOUD_PROJECT"

[functions]
  directory = "netlify/functions"

# ローカル開発: 2ターミナル構成
#   Terminal 1: npm run dev:functions  → netlify dev (Functions専用, port 8888)
#   Terminal 2: npm run dev:frontend   → Vite (port 5173) ← ブラウザはここに接続
#
# publish = ".netlify/dev-static" により frontend/dist/ を配信しない。
# （prod ビルドを dev で誤配信すると import.meta.env.DEV=false になり
#   connectAuthEmulator が呼ばれず本番 Firebase に繋がるため）
[dev]
  port = 8888
  publish = ".netlify/dev-static"
  autoLaunch = false
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
